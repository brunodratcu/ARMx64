<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Edge Node</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070909;
    --grid: #0c1210;
    --border: #121e1a;
    --text-dim: #2a3d35;
    --accent: #4a7a6a;
    --accent-dim: #223830;
    --accent-glow: rgba(74,122,106,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: #b0bab6;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    z-index:0;
  }
  body::after {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    pointer-events:none; z-index:100;
  }
  .glow-bg {
    position:fixed; width:500px; height:500px;
    border-radius:50%;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none; z-index:1;
    transition: background 1s ease;
    animation: breathe 5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.1);}
  }
  .container {
    position:relative; z-index:10;
    text-align:center; padding:2rem;
    max-width:560px; width:100%;
  }
  .indicator {
    position:relative;
    width:130px; height:130px;
    margin:0 auto 2.5rem;
  }
  .ring {
    position:absolute; inset:0;
    border-radius:50%;
    border:1px solid var(--accent);
    opacity:0;
  }
  body.online  .ring-1{animation:pulse-out 2.4s 0.0s ease-out infinite;}
  body.online  .ring-2{animation:pulse-out 2.4s 0.8s ease-out infinite;}
  body.online  .ring-3{animation:pulse-out 2.4s 1.6s ease-out infinite;}
  body.checking .ring-1{animation:spin-ring 1.8s linear infinite; opacity:0.3;}
  @keyframes pulse-out {
    0%{transform:scale(0.6);opacity:0.5;}
    100%{transform:scale(1.9);opacity:0;}
  }
  @keyframes spin-ring { to{transform:rotate(360deg);} }
  .core {
    position:absolute; inset:22px;
    border-radius:50%;
    border:1px solid var(--accent-dim);
    background:radial-gradient(circle,#060e0a 0%,var(--bg) 70%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 20px var(--accent-glow);
    transition: border-color 0.8s, box-shadow 0.8s;
  }
  .core-dot {
    width:20px; height:20px; border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 18px var(--accent),0 0 36px var(--accent-dim);
    transition: background 0.8s, box-shadow 0.8s;
  }
  body.online   .core-dot{animation:pulse-dot 2s ease-in-out infinite;}
  body.offline  .core-dot{animation:flicker 3s ease-in-out infinite;}
  body.checking .core-dot{animation:blink-dot 0.8s step-end infinite;}
  @keyframes pulse-dot {0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
  @keyframes flicker {0%,100%{opacity:1;}45%{opacity:0.2;}50%{opacity:0.8;}55%{opacity:0.15;}}
  @keyframes blink-dot {50%{opacity:0.3;}}
  .label-top {
    font-family:'Rajdhani',sans-serif;
    font-size:0.62rem; font-weight:600;
    letter-spacing:0.35em; color:var(--text-dim);
    text-transform:uppercase; margin-bottom:0.4rem;
  }
  .status-text {
    font-family:'Rajdhani',sans-serif;
    font-size:3rem; font-weight:600;
    letter-spacing:0.1em; color:var(--accent);
    line-height:1;
    text-shadow:0 0 30px var(--accent-glow);
    transition: color 0.8s, text-shadow 0.8s;
  }
  .divider {
    width:50px; height:1px;
    background:linear-gradient(90deg,transparent,var(--accent-dim),transparent);
    margin:1.1rem auto;
    transition: background 0.8s;
  }
  .message {
    font-family:'Rajdhani',sans-serif;
    font-size:0.9rem; font-weight:300;
    color:#3a5048; line-height:1.7; min-height:3em;
  }
  .metrics {
    display:grid; grid-template-columns:1fr 1fr 1fr;
    gap:1px; background:var(--border);
    border:1px solid var(--border); margin-top:2rem;
    opacity:0; transform:translateY(6px);
    transition: opacity 0.6s 0.3s, transform 0.6s 0.3s;
    pointer-events:none;
  }
  body.online .metrics{opacity:1;transform:translateY(0);pointer-events:auto;}
  .metric{background:var(--bg);padding:0.85rem 0.4rem;text-align:center;}
  .metric-val{
    font-size:1.25rem; color:var(--accent);
    text-shadow:0 0 10px var(--accent-glow);
    display:block; margin-bottom:0.2rem;
    transition: color 0.8s;
  }
  .metric-label{
    font-size:0.56rem; letter-spacing:0.15em;
    color:var(--text-dim);
    font-family:'Rajdhani',sans-serif; font-weight:600;
    text-transform:uppercase;
  }
  .terminal {
    margin-top:1px; background:#050909;
    border:1px solid var(--border); border-top:none;
    padding:0.85rem 1.1rem; text-align:left;
    font-size:0.7rem; color:var(--text-dim);
    position:relative; max-height:0; overflow:hidden;
    transition: max-height 0.5s ease, padding 0.3s;
  }
  body.online .terminal, body.offline .terminal{max-height:120px;padding:0.85rem 1.1rem;}
  .terminal::before{
    content:'LOG'; position:absolute;
    top:-0.55rem; left:1rem;
    background:var(--bg); padding:0 0.4rem;
    font-size:0.58rem; letter-spacing:0.2em; color:var(--text-dim);
  }
  .log-line{margin-bottom:0.25rem;}
  .log-line .ts{color:#1a2820;}
  .log-line .ok{color:var(--accent);transition:color 0.8s;}
  .log-line .err{color:#7a1010;}
  .log-line .inf{color:#1e3828;}
  .log-line.cur::after{content:'█';animation:blink 1s step-end infinite;color:var(--accent);}
  @keyframes blink{50%{opacity:0;}}
  .badge {
    display:inline-flex; align-items:center; gap:0.5rem;
    margin-top:1.8rem; padding:0.45rem 1rem;
    border:1px solid var(--border);
    font-size:0.65rem; color:var(--text-dim);
    letter-spacing:0.15em; transition: border-color 0.8s;
  }
  .badge-dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);transition:background 0.8s;
  }
  body.online  .badge-dot{animation:pulse-dot 2s ease-in-out infinite;}
  body.offline .badge-dot{animation:blink 2s step-end infinite;}
  .corner{position:fixed;width:36px;height:36px;opacity:0.18;transition:border-color 0.8s;}
  .corner.tl{top:1.5rem;left:1.5rem;border-top:1px solid var(--accent);border-left:1px solid var(--accent);}
  .corner.tr{top:1.5rem;right:1.5rem;border-top:1px solid var(--accent);border-right:1px solid var(--accent);}
  .corner.bl{bottom:1.5rem;left:1.5rem;border-bottom:1px solid var(--accent);border-left:1px solid var(--accent);}
  .corner.br{bottom:1.5rem;right:1.5rem;border-bottom:1px solid var(--accent);border-right:1px solid var(--accent);}
  .node-id{
    position:fixed;bottom:1.5rem;left:50%;
    transform:translateX(-50%);
    font-size:0.58rem;color:var(--text-dim);
    letter-spacing:0.2em;opacity:0.35;
  }
</style>
</head>
<body class="checking">
<div class="glow-bg"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="container">
  <div class="label-top">Pi Edge Node · Status</div>
  <div class="indicator">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="core"><div class="core-dot"></div></div>
  </div>
  <div class="status-text" id="status-text">CHECKING</div>
  <div class="divider"></div>
  <p class="message" id="message">Verificando conexão com o nó...</p>
  <div class="metrics">
    <div class="metric">
      <span class="metric-val" id="m-mem">—</span>
      <span class="metric-label">RAM livre</span>
    </div>
    <div class="metric">
      <span class="metric-val" id="m-temp">—</span>
      <span class="metric-label">Temperatura</span>
    </div>
    <div class="metric">
      <span class="metric-val" id="m-load">—</span>
      <span class="metric-label">CPU Load</span>
    </div>
  </div>
  <div class="terminal" id="terminal">
    <div class="log-line cur" id="log-last">
      <span class="ts" id="log-ts">[--:--:--]</span>
      <span class="inf" id="log-msg"> aguardando resposta...</span>
    </div>
  </div>
  <div class="badge">
    <div class="badge-dot"></div>
    <span id="badge-text">CONECTANDO...</span>
  </div>
</div>
<div class="node-id">NODE · RPI4B · EDGE-01</div>

<!-- config.js é gerado pelo GitHub Actions — não commitar -->
<script src="config.js" onerror="void 0"></script>
<script>
  // PI_URL vem do config.js (injetado pelo Actions via secret PI_FUNNEL_URL)
  // Para teste local: crie config.js com:
  //   window.__PI_URL__ = "https://SEU-NODE.tail1234.ts.net";
  const PI_URL      = window.__PI_URL__ || "http://localhost:5000";
  const TIMEOUT_MS  = 6000;
  const RETRY_MS    = 20000;

  const THEMES = {
    online:   {accent:"#00e5a0", dim:"#007a50", glow:"rgba(0,229,160,0.12)"},
    offline:  {accent:"#ff2d2d", dim:"#7a1010", glow:"rgba(255,45,45,0.10)"},
    checking: {accent:"#4a7a6a", dim:"#223830", glow:"rgba(74,122,106,0.08)"}
  };

  function applyTheme(state) {
    const t = THEMES[state], r = document.documentElement.style;
    r.setProperty("--accent",      t.accent);
    r.setProperty("--accent-dim",  t.dim);
    r.setProperty("--accent-glow", t.glow);
  }

  function ts() { return new Date().toTimeString().slice(0,8); }

  function setLog(msg, type="inf") {
    document.getElementById("log-ts").textContent = `[${ts()}]`;
    const el = document.getElementById("log-msg");
    el.className = type;
    el.textContent = " " + msg;
  }

  let uptimeInterval=null, retryCountdown=null, retrySeconds=0;

  function startRetryCountdown() {
    retrySeconds = RETRY_MS / 1000;
    clearInterval(retryCountdown);
    retryCountdown = setInterval(() => {
      retrySeconds--;
      document.getElementById("badge-text").textContent = `PRÓXIMA VERIFICAÇÃO EM ${retrySeconds}s`;
      if (retrySeconds <= 0) clearInterval(retryCountdown);
    }, 1000);
  }

  function setChecking() {
    document.body.className = "checking";
    applyTheme("checking");
    document.getElementById("status-text").textContent = "CHECKING";
    document.getElementById("message").textContent     = "Verificando conexão com o nó...";
    document.getElementById("badge-text").textContent  = "CONECTANDO...";
    setLog("tentando /health...", "inf");
    clearInterval(uptimeInterval);
  }

  function setOnline(data) {
    document.body.className = "online";
    applyTheme("online");
    document.getElementById("status-text").textContent = "ONLINE";
    document.getElementById("message").innerHTML =
      "Nó operacional e acessível.<br>Conexão Tailscale Funnel estabelecida.";
    setLog("resposta recebida · status ok", "ok");
    let secs = data.uptime?.system_seconds || 0;
    const fmt = s => `${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
    clearInterval(uptimeInterval);
    document.getElementById("badge-text").textContent = `UPTIME ${fmt(secs)}`;
    uptimeInterval = setInterval(() => {
      secs++;
      document.getElementById("badge-text").textContent = `UPTIME ${fmt(secs)}`;
    }, 1000);
  }

  function setOffline() {
    document.body.className = "offline";
    applyTheme("offline");
    document.getElementById("status-text").textContent = "OFFLINE";
    document.getElementById("message").innerHTML =
      "O nó não está respondendo.<br>Verifique se o Raspberry Pi está ligado.";
    setLog("timeout · host não respondeu", "err");
    clearInterval(uptimeInterval);
    startRetryCountdown();
  }

  async function fetchMetrics() {
    try {
      const res = await fetch(`${PI_URL}/metrics`, {signal: AbortSignal.timeout(TIMEOUT_MS)});
      const d   = await res.json();
      document.getElementById("m-mem").textContent  = (d.memory?.available_mb ?? "—") + "MB";
      document.getElementById("m-temp").textContent = (d.cpu?.temp_celsius    ?? "—") + "°C";
      document.getElementById("m-load").textContent =  d.cpu?.load_1min       ?? "—";
    } catch {}
  }

  async function check() {
    setChecking();
    try {
      const res = await fetch(`${PI_URL}/health`, {
        signal: AbortSignal.timeout(TIMEOUT_MS),
        cache: "no-store"
      });
      if (res.ok) {
        const data = await res.json();
        setOnline(data);
        fetchMetrics();
      } else {
        setOffline();
      }
    } catch {
      setOffline();
    }
    setTimeout(check, RETRY_MS);
  }

  check();
</script>
</body>
</html>

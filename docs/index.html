<!DOCTYPE html>
<html>
<head>
    <title>PiEdge Status</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; background:#111; color:#0f0; padding:20px }
        .box { border:1px solid #0f0; padding:10px; margin:10px 0 }
    </style>
</head>
<body>

<h1>PiEdge Node</h1>

<div class="box" id="status"></div>
<div class="box" id="clients"></div>

<script>
async function load() {
    const s = await fetch('/status').then(r=>r.json())
    const c = await fetch('/clients').then(r=>r.json())

    document.getElementById('status').innerHTML =
        `<b>WAN:</b> ${s.wan_ok ? "OK" : "DOWN"}<br>
         <b>WAN IP:</b> ${s.wan_ip}<br>
         <b>AP IP:</b> ${s.ap_ip}<br>
         <b>Clientes:</b> ${s.ap_clients}<br>
         <b>Uptime:</b> ${s.uptime}`

    document.getElementById('clients').innerHTML =
        "<b>Dispositivos:</b><br>" +
        c.devices.map(d =>
            `${d.ip} | ${d.mac} | ${d.hostname}`
        ).join("<br>")
}

setInterval(load, 2000)
load()
</script>

</body>
</html>
